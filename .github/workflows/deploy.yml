name: deploy
on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: build & test
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - name: install
        run: npm ci
      - name: lint
        run: npm run lint
      - name: typecheck
        run: npm run typecheck
      - name: unit tests + coverage gate
        run: npm test
      - name: build
        run: npm run build
      - name: bundle size budget (≤ 110 KB gzipped, Phase 8 memo decision 16)
        run: |
          set -e
          gzip_size=$(find dist/assets -name '*.js' -exec gzip -c {} \; | wc -c)
          echo "JS gzipped bundle size: ${gzip_size} bytes"
          # Phase 8.A.2b bumps the budget from 75 KB to 110 KB to
          # accommodate fflate (~30 KB) + the Phase 8 router + verifier
          # + share + save layers (~15 KB combined). Phase 8.A.2b actual
          # is ~40 KB gzipped; the headroom carries Phase 9 polish.
          if [ "$gzip_size" -gt 112640 ]; then
            echo "::error::Bundle size ${gzip_size} bytes exceeds 110 KB budget"
            exit 1
          fi
      - name: upload bundle report (memo addendum N5)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bundle-report
          path: |
            dist/**/*.js
            dist/**/*.css
            dist/index.html
          if-no-files-found: warn
          retention-days: 30
      - name: install playwright browsers
        run: npx playwright install --with-deps chromium firefox webkit
      - name: cross-runtime e2e
        run: npm run test:e2e
      - name: configure pages
        uses: actions/configure-pages@v5
        with:
          # Self-bootstrap Pages on first run so the host doesn't need to
          # toggle "Source: GitHub Actions" in repo Settings → Pages manually.
          enablement: true
      - name: upload pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  # Phase 4.B cross-OS PNG byte-equality matrix (memo addendum N14).
  # Each runner regenerates assets/atlas.png and uploads it; the
  # aggregate job below asserts pairwise SHA-256 equality. fail-fast:
  # false so a single-OS failure still surfaces the other two hashes
  # for diagnosis. Node 20.x is pinned — a runner-image bump that
  # ships Node 22 mid-2026 could subtly change fflate's output and is
  # an architecture-red-team review event per addendum N14.
  cross-os-atlas-equality:
    name: cross-os atlas equality (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        node-version: ["20.x"]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: "npm"
      - name: install
        run: npm ci
      - name: regenerate atlas
        run: npm run gen-atlas
      # Decision 10's CI gate: the regenerated assets/atlas.png MUST
      # match the checked-in bytes. Any drift means the source-of-truth
      # is stale; fail loudly with the diff visible.
      - name: assert regen matches checked-in atlas
        shell: bash
        run: git diff --exit-code -- assets/
      - name: upload regenerated atlas
        uses: actions/upload-artifact@v4
        with:
          name: atlas-png-${{ matrix.os }}
          path: assets/atlas.png
          if-no-files-found: error
          retention-days: 30

  cross-os-atlas-equality-aggregate:
    name: cross-os atlas equality (aggregate)
    needs: cross-os-atlas-equality
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - name: download ubuntu artifact
        uses: actions/download-artifact@v4
        with:
          name: atlas-png-ubuntu-latest
          path: out/ubuntu
      - name: download macos artifact
        uses: actions/download-artifact@v4
        with:
          name: atlas-png-macos-latest
          path: out/macos
      - name: download windows artifact
        uses: actions/download-artifact@v4
        with:
          name: atlas-png-windows-latest
          path: out/windows
      - name: assert pairwise SHA-256 equality
        shell: bash
        run: |
          set -e
          ubuntu_hash=$(sha256sum out/ubuntu/atlas.png | awk '{print $1}')
          macos_hash=$(sha256sum out/macos/atlas.png | awk '{print $1}')
          windows_hash=$(sha256sum out/windows/atlas.png | awk '{print $1}')
          echo "ubuntu-latest:  ${ubuntu_hash}"
          echo "macos-latest:   ${macos_hash}"
          echo "windows-latest: ${windows_hash}"
          if [ "${ubuntu_hash}" != "${macos_hash}" ] || [ "${ubuntu_hash}" != "${windows_hash}" ]; then
            echo "::error::Cross-OS atlas hash drift detected — see per-OS hashes above"
            exit 1
          fi
          echo "All three runners produced byte-identical assets/atlas.png."

  deploy:
    name: deploy to GitHub Pages
    needs: [build, cross-os-atlas-equality-aggregate]
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
