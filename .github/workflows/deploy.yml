name: deploy
on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: build & test
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - name: install
        run: npm ci
      - name: lint
        run: npm run lint
      - name: typecheck
        run: npm run typecheck
      - name: unit tests + coverage gate
        run: npm test
      - name: build
        run: npm run build
      - name: install playwright browsers
        run: npx playwright install --with-deps chromium firefox webkit
      - name: cross-runtime e2e
        run: npm run test:e2e
      - name: configure pages
        uses: actions/configure-pages@v5
        with:
          # Self-bootstrap Pages on first run so the host doesn't need to
          # toggle "Source: GitHub Actions" in repo Settings → Pages manually.
          enablement: true
      - name: upload pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    name: deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
